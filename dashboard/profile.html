<!DOCTYPE html>
<html lang="en">

<head>

	<!-- ==========================================
         Basic Page Configuration
    =========================================== -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Profile</title>

	<!-- ==========================================
         Bootstrap CSS & JavaScript
    =========================================== -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		crossorigin="anonymous">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>

	<!-- ==========================================
         Font Awesome Icons
    =========================================== -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

	<!-- ==========================================
         Custom Styles
    =========================================== -->
	<link rel="stylesheet" href="../CSS/style.css">

	<!-- ==========================================
         Application Scripts
    =========================================== -->
	<script src="../Only_JS/config.js"></script>
	<script src="../Only_JS/auth.js"></script>
	<script src="../Only_JS/popup.js"></script>
	

</head>

<body>

	<!-- ==========================================
         Dashboard Wrapper
    =========================================== -->
	<div class="dashboard-shell">

		<!-- ==========================================
             Dashboard Header
        =========================================== -->
		<header class="dashboard-header">

			<!-- Sidebar Toggle & Page Title -->
			<div class="brand-wrap">

				<button  class="menu-toggle" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvas"
					aria-controls="offcanvas" aria-label="Open navigation">

					<span></span>
					<span></span>
					<span></span>

				</button>

				<h1 class="h3 mb-0">
					Profile
				</h1>

			</div>

			<!-- Current Page Status -->
			<div class="header-actions">
				<span class="status-pill">
					Account
				</span>
			</div>

		</header>

		<!-- ==========================================
             Main Content
        =========================================== -->
		<main class="dashboard-main">

			<div class="container py-4">

				<div class="row justify-content-center">

					<!-- ==========================================
                         Profile Card
                    =========================================== -->
					<div class="col-lg-8">

						<div class="card shadow-sm rounded-4">

							<div class="card-body p-4">

								<!-- ==========================================
                                     Profile Header
                                =========================================== -->
								<div class="d-flex align-items-start gap-4 mb-3">

									<!-- User Avatar -->
									<div class="text-center">

										<img id="avatarPreview" src="../images/profile.png" alt="Avatar preview"
											class="profile-avatar rounded-circle mb-2">

										<!-- Avatar Controls -->
										<div>

											<label for="avatarInput" class="form-label visually-hidden">
												Upload Avatar
											</label>

											<input type="file" id="avatarInput" accept="image/*"
												class="form-control form-control-sm mb-2">

											<button type="button" id="removeAvatar"
												class="btn btn-sm btn-outline-danger">

												Remove

											</button>

										</div>

									</div>

									<!-- Profile Information -->
									<div class="flex-grow-1">

										<h3 class="mb-1">
											Profile
										</h3>

										<p class="text-muted">
											Manage your name, password and account settings.
										</p>

									</div>

								</div>

								<!-- ==========================================
                                     Profile Form
                                =========================================== -->
								<form id="profileForm">

									<!-- User Name -->
									<div class="row g-2 mb-3">

										<!-- First Name -->
										<div class="col-md-6">

											<label for="profileFirstName" class="form-label">

												First Name

											</label>

											<input type="text" class="form-control" id="profileFirstName"
												placeholder="First name">

										</div>

										<!-- Last Name -->
										<div class="col-md-6">

											<label for="profileLastName" class="form-label">

												Last Name

											</label>

											<input type="text" class="form-control" id="profileLastName"
												placeholder="Last name">

										</div>

									</div>

									<!-- Email Address -->
									<div class="mb-3">

										<label for="profileEmail" class="form-label">

											Email

										</label>

										<input type="email" class="form-control" id="profileEmail"
											placeholder="maria@site.com">

									</div>

									<!-- Password Fields -->
									<div class="row g-2 mb-3">
										<!-- Current Password -->
										<div class="col-md-6">

											<label for="currentPassword" class="form-label">

												Password

											</label>

											<input type="password" class="form-control" id="currentPassword"
												placeholder="Enter current password">

										</div>

										<!-- New Password -->
										<div class="col-md-6">

											<label for="newPassword" class="form-label">

												New Password

											</label>

											<input type="password" class="form-control" id="newPassword"
												placeholder="Enter new password">

										</div>

									</div>

									<!-- ==========================================
                                         Contact Information
                                    =========================================== -->
									<div class="row g-2 mb-3">

										<!-- Phone Number -->
										<div class="col-md-8">

											<label for="profilePhone" class="form-label">

												Phone (Optional)

											</label>

											<input type="tel" class="form-control" id="profilePhone"
												placeholder="+x(xxx)xxx-xx-xx">

										</div>

										<!-- Phone Type -->
										<div class="col-md-4">

											<label for="phoneType" class="form-label">

												Type

											</label>

											<select id="phoneType" class="form-select">

												<option value="mobile">
													Mobile
												</option>

												<option value="home">
													Home
												</option>

												<option value="work">
													Work
												</option>

											</select>

										</div>

									</div>

									<!-- ==========================================
                                         Gender Selection
                                    =========================================== -->
									<div class="mb-3">

										<label class="form-label d-block">
											Gender
										</label>

										<div class="btn-group" role="group" aria-label="Gender">

											<input type="radio" class="btn-check" name="genderOptions" id="genderMale"
												value="male">

											<label class="btn btn-outline-secondary" for="genderMale">

												Male

											</label>

											<input type="radio" class="btn-check" name="genderOptions" id="genderFemale"
												value="female">

											<label class="btn btn-outline-secondary" for="genderFemale">

												Female

											</label>

											<input type="radio" class="btn-check" name="genderOptions" id="genderOther"
												value="other">

											<label class="btn btn-outline-secondary" for="genderOther">

												Other

											</label>

										</div>

									</div>

									<!-- ==========================================
                                         Form Action Buttons
                                    =========================================== -->
									<div class="d-flex justify-content-end gap-2 mt-3">

										<!-- Cancel Button -->
										<button type="button" class="btn btn-light">

											Cancel

										</button>

										<!-- Save Profile Button -->
										<button type="submit" class="btn btn-primary">

											Update

										</button>

									</div>

								</form>

							</div>

						</div>

					</div>

				</div>

			</div>

		</main>

	</div>

	<!-- ==========================================
         Navbar Container (Loaded Dynamically)
    =========================================== -->
	<div id="navbar-container"></div>

	<!-- ==========================================
         Global Loader
    =========================================== -->
	<script src="../Only_JS/loader.js"></script>

	<!-- ==========================================
         Navigation Script
    =========================================== -->
	<script src="navbar.js"></script>
     <!-- ==========================================
     Profile Script
     =========================================== -->
	<script src="profile.js"></script>

</body>

</html>
