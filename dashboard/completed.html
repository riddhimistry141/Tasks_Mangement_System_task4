<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../Only_JS/config.js"></script>
</head>

<body>
    <!-- ==========================================
     Dashboard Wrapper
     =========================================== -->
    <div class="dashboard-shell">
        <!-- ==========================================
     Dashboard header
    =========================================== -->
        <header class="dashboard-header">
            <!-- Sidebar Toggle & Page Title -->
            <div class="brand-wrap">
                <button class="menu-toggle" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvas" aria-controls="offcanvas" aria-label="Open navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1 class="h3 mb-0">Completed</h1>
            </div>
            <!-- Header status -->
            <div class="header-actions">
                <span class="status-pill">Cheked</span>
            </div>
        </header>

        <!-- ==========================================
        Main Dashboard Content
        =========================================== -->
        <main class="dashboard-main">

            <!-- ==========================================
         Completed Tasks Section
    =========================================== -->
            <section class="welcome-card">

                <!-- Page Heading -->
                <h2>Completed</h2>

                <!-- Page Description -->
                <p>
                    A quick list of the tasks and milestones you have already finished.
                </p>

                <!-- ==========================================
             Completed Tasks Container
             =========================================== -->
                <div id="completedContainer" class="card shadow-sm rounded-4 mt-4 p-4">

                    <!-- Empty State Message -->
                    <div id="completedEmpty" class="text-center text-secondary">

                        No completed tasks yet.

                    </div>

                    <!-- Completed Tasks List -->
                    <div id="completedTasksList" class="mb-0"></div>

                </div>

            </section>

        </main>

        <!-- ==========================================
     Dashboard Navigation Container
    =========================================== -->
        <div id="navbar-container"></div>

        <!-- ==========================================
     Global Loader Script
    =========================================== -->
        <script src="../Only_JS/loader.js"></script>

        <!-- ==========================================
     Dashboard Navigation Script
    =========================================== -->
        <script src="navbar.js"></script>

        <!-- ==========================================
     Task Management Script
    =========================================== -->
        <script src="tasks.js"></script>

        <!-- ==========================================
     Completed Tasks Script
      =========================================== -->
        <script src="../dashboard/completed.js"></script>
       </div> 
</body>

</html>
